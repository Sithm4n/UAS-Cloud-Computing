version: '3.8'

services:
  # --- APP LAYER (Minggu 1) ---
  wordpress:
    image: wordpress:latest
    container_name: wp_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db_server
      WORDPRESS_DB_USER: ${WP_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WP_DB_NAME}
      # Environment tambahan untuk plugin Redis nantinya
      WORDPRESS_CACHE_HOST: redis_cache
      WORDPRESS_CACHE_PORT: 6379
    networks:
      - frontend-net
      - backend-net
    volumes:
      - wp_data:/var/www/html
    depends_on:
      - db_server
      - redis_cache
      - minio_storage

  # --- DATABASE LAYER (Minggu 1) ---
  db_server:
    image: mariadb:10.11
    container_name: wp_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${WP_DB_NAME}
      MYSQL_USER: ${WP_DB_USER}
      MYSQL_PASSWORD: ${WP_DB_PASSWORD}
    networks:
      - backend-net
    volumes:
      - db_data:/var/lib/mysql

  # --- CACHING LAYER (Baru - Minggu 2) ---
  redis_cache:
    image: redis:alpine
    container_name: wp_redis
    restart: unless-stopped
    networks:
      - backend-net # Terisolasi di backend, WordPress akan berkomunikasi via jaringan internal ini

  # --- CLOUD/OBJECT STORAGE LAYER (Baru - Minggu 2) ---
  minio_storage:
    image: minio/minio:latest
    container_name: wp_minio
    restart: unless-stopped
    ports:
      - "9000:9000" # Port API S3 (Untuk koneksi plugin WordPress)
      - "9001:9001" # Port Console/Dashboard (Untuk Anda akses via browser)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}        # Username MinIO
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD} # Password MinIO
    command: server /data --console-address ":9001"
    networks:
      - frontend-net # Diperlukan agar Anda bisa membuka dashboard di browser
      - backend-net  # Diperlukan agar WordPress bisa mengirim media ke sini
    volumes:
      - minio_data:/data # Persistensi data untuk file media yang diupload

# --- INISIALISASI NETWORK & VOLUME ---
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

volumes:
  wp_data:
  db_data:
  minio_data: # Volume baru untuk menyimpan file gambar/media Object Storage
